name: Earnings Alert

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  earnings-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Europe/Luxembourg
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run earnings alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
        run: python agents/alerts/finviz_earnings_alert.py

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_ALERTS }}" \
            -H 'Content-type: application/json' \
            --data '{"text": ":x: *Earnings alert failed* on `'"$(date +%Y-%m-%d)"'`\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

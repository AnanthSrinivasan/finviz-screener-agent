name: Earnings Alert

on:
  schedule:
    # 21:00 CET = 20:00 UTC (winter) / 19:00 UTC (summer)
    # Running at 19:00 UTC covers both — fires before the daily screener
    - cron: '0 19 * * 1-5'
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  earnings-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run earnings alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python finviz_earnings_alert.py

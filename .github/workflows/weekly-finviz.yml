name: Weekly Finviz Review

on:
  schedule:
    # 18:00 UTC Sunday = 19:00 CET / 20:00 CEST
    # Runs after markets close Friday, giving you the full week's data
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Luxembourg
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GITHUB_PAGES_BASE: ${{ secrets.PAGES_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ATR_THRESHOLD: "3.0"
      DATA_DIR: "data"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly review agent
        run: python finviz_weekly_agent.py

      - name: Regenerate index page
        env:
          GITHUB_PAGES_BASE: ${{ secrets.PAGES_BASE_URL }}
          DATA_DIR: data
        run: python generate_index.py

      - name: Commit weekly report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --cached --quiet || git commit -m "chore: weekly review $(date +%Y-%m-%d)"
          git push

      - name: Upload weekly report artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: finviz-weekly-review
          path: data/finviz_weekly_*.html
          retention-days: 90

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": ":x: *Weekly Finviz review failed* on `'"$(date +%Y-%m-%d)"'`\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

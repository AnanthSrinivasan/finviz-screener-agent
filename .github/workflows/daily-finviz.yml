name: Daily Finviz Screener

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  run-finviz:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Luxembourg
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DAILY }}
      GITHUB_PAGES_BASE: ${{ secrets.PAGES_BASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ATR_THRESHOLD: "3.0"
      SNAPSHOT_WORKERS: "6"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Finviz agent
        run: python finviz_agent.py

      - name: Regenerate index page
        env:
          GITHUB_PAGES_BASE: ${{ secrets.PAGES_BASE_URL }}
          DATA_DIR: data
        run: python generate_index.py

      - name: Regenerate dashboard
        env:
          GITHUB_PAGES_BASE: ${{ secrets.PAGES_BASE_URL }}
          DATA_DIR: data
        run: python generate_dashboard.py

      - name: Commit output data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html dashboard.html
          git diff --cached --quiet || git commit -m "chore: finviz data $(date +%Y-%m-%d)"
          git push

      - name: Upload chart gallery artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: finviz-chart-gallery
          path: data/finviz_chart_grid_*.html
          retention-days: 30

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_ALERTS }}" \
            -H 'Content-type: application/json' \
            --data '{"text": ":x: *Daily screener failed* on `'"$(date +%Y-%m-%d)"'`\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

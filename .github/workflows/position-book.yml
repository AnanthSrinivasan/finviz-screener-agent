name: Position Book

# Consolidated position-book Slack at 3 fixed times per US trading day.
# Replaces the per-event hourly spam from the old position-monitor cron.
# A separate workflow (position-critical.yml) runs every 30 min and only posts
# stop_hit / auto_close / share_drift / T1 / T2 events as immediate one-shots.

on:
  schedule:
    - cron: '15 13 * * 1-5'   # 9:15 AM ET — pre-open book
    - cron: '30 14 * * 1-5'   # 10:30 AM ET — post-open book
    - cron: '30 17 * * 1-5'   # 1:30 PM ET — mid-day book
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker symbol'
        required: false
      shares:
        description: 'Number of shares'
        required: false
      price:
        description: 'Execution price'
        required: false
      side:
        description: 'BUY or SELL'
        required: false
      watchlist_action:
        description: 'Watchlist action: focus | archive | unarchive'
        required: false
      watchlist_ticker:
        description: 'Ticker for watchlist action (separate from trade ticker)'
        required: false

jobs:
  position-book:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Europe/Luxembourg
      PYTHONPATH: .
      BOOK_RUN: '1'
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_POSITIONS }}
      SNAPTRADE_CLIENT_ID: ${{ secrets.SNAPTRADE_CLIENT_ID }}
      SNAPTRADE_CONSUMER_KEY: ${{ secrets.SNAPTRADE_CONSUMER_KEY }}
      SNAPTRADE_USER_ID: ${{ vars.SNAPTRADE_USER_ID }}
      SNAPTRADE_USER_SECRET: ${{ secrets.SNAPTRADE_USER_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Pull latest
        run: git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run position monitor (book mode)
        env:
          INPUT_TICKER: ${{ github.event.inputs.ticker }}
          INPUT_SHARES: ${{ github.event.inputs.shares }}
          INPUT_PRICE: ${{ github.event.inputs.price }}
          INPUT_SIDE: ${{ github.event.inputs.side }}
          INPUT_WATCHLIST_ACTION: ${{ github.event.inputs.watchlist_action }}
          INPUT_WATCHLIST_TICKER: ${{ github.event.inputs.watchlist_ticker }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
        run: python agents/trading/position_monitor.py

      - name: Run Alpaca paper monitor
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
        run: python -m agents.trading.alpaca_monitor

      - name: Regenerate dashboard
        if: success()
        env:
          GITHUB_PAGES_BASE: ${{ secrets.PAGES_BASE_URL }}
          DATA_DIR: data
        run: python utils/generators/generate_dashboard.py

      - name: Regenerate watchlist page
        if: success()
        env:
          GITHUB_PAGES_BASE: ${{ secrets.PAGES_BASE_URL }}
          DATA_DIR: data
        run: python utils/generators/generate_watchlist.py

      - name: Regenerate performance page
        if: success()
        env:
          DATA_DIR: data
        run: python utils/generate_performance.py

      - name: Commit state changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/positions.json data/trading_state.json data/paper_stops.json data/watchlist.json data/book_last_post.json data/claude_portfolio.html data/performance_2026.html dashboard.html watchlist.html || true
          git diff --cached --quiet || git commit -m "Update positions/trading state [skip ci]"
          git push || true

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_ALERTS }}" \
            -H 'Content-type: application/json' \
            --data '{"text": ":x: *Position book failed* `'"$(date '+%Y-%m-%d %H:%M')"'`\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

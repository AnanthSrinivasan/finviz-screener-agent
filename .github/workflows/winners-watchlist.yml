name: Winners Watchlist

on:
  schedule:
    # 19:00 UTC Monday = 21:00 CET / 20:00 CEST
    - cron: '0 19 * * 1'
  workflow_dispatch:

jobs:
  winners-watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Luxembourg
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run winners watchlist
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_WEEKLY }}
        run: python finviz_winners_watchlist.py

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_ALERTS }}" \
            -H 'Content-type: application/json' \
            --data '{"text": ":x: *Winners watchlist failed* `'"$(date +%Y-%m-%d)"'`\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

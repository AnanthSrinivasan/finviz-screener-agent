name: Position Monitor

on:
  schedule:
    # Every hour during US market hours (13:00–20:00 UTC = 10am–5pm ET)
    - cron: '0 14-21 * * 1-5'
    # Pre-market (8am ET = 12:00 UTC) and after-hours (6pm ET = 21:00 UTC)
    # Catches entries placed outside regular hours
    - cron: '0 12 * * 1-5'
    - cron: '0 22 * * 1-5'
    # Weekend reconciliation — catch after-hours/weekend trades
    - cron: '0 16 * * 0,6'
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker symbol'
        required: false
      shares:
        description: 'Number of shares'
        required: false
      price:
        description: 'Execution price'
        required: false
      side:
        description: 'BUY or SELL'
        required: false

jobs:
  position-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Europe/Luxembourg
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_POSITIONS }}
      SNAPTRADE_CLIENT_ID: ${{ secrets.SNAPTRADE_CLIENT_ID }}
      SNAPTRADE_CONSUMER_KEY: ${{ secrets.SNAPTRADE_CONSUMER_KEY }}
      SNAPTRADE_USER_ID: ${{ vars.SNAPTRADE_USER_ID }}
      SNAPTRADE_USER_SECRET: ${{ secrets.SNAPTRADE_USER_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Pull latest
        run: git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run position monitor
        env:
          INPUT_TICKER: ${{ github.event.inputs.ticker }}
          INPUT_SHARES: ${{ github.event.inputs.shares }}
          INPUT_PRICE: ${{ github.event.inputs.price }}
          INPUT_SIDE: ${{ github.event.inputs.side }}
        run: python agents/trading/position_monitor.py

      - name: Run Alpaca paper monitor
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
        run: python agents/trading/alpaca_monitor.py

      - name: Regenerate dashboard
        if: success()
        env:
          GITHUB_PAGES_BASE: ${{ secrets.PAGES_BASE_URL }}
          DATA_DIR: data
        run: python utils/generate_dashboard.py

      - name: Commit state changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/positions.json data/trading_state.json data/paper_stops.json data/watchlist.json dashboard.html || true
          git diff --cached --quiet || git commit -m "Update positions/trading state [skip ci]"
          git push || true

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_ALERTS }}" \
            -H 'Content-type: application/json' \
            --data '{"text": ":x: *Position monitor failed* `'"$(date '+%Y-%m-%d %H:%M')"'`\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'

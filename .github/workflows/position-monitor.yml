name: Position Monitor

on:
  schedule:
    # Every 30 minutes during US market hours (14:30–21:00 UTC = 9:30am–4pm ET)
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch:

jobs:
  position-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Europe/Luxembourg
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_POSITIONS }}
      SNAPTRADE_CLIENT_ID: ${{ secrets.SNAPTRADE_CLIENT_ID }}
      SNAPTRADE_CONSUMER_KEY: ${{ secrets.SNAPTRADE_CONSUMER_KEY }}
      SNAPTRADE_USER_ID: ${{ secrets.SNAPTRADE_USER_ID }}
      SNAPTRADE_USER_SECRET: ${{ secrets.SNAPTRADE_USER_SECRET }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run position monitor
        run: python finviz_position_monitor.py

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_ALERTS }}" \
            -H 'Content-type: application/json' \
            --data '{"text": ":x: *Position monitor failed* `'"$(date +%Y-%m-%d %H:%M)"'`\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
